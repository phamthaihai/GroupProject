<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #e0e7ff 0%, #f1f5f9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* Reset Card Box */
        .box {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 40px 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05),
            0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        h2 {
            text-align: center;
            font-size: 24px;
            color: #1e293b;
            font-weight: 700;
            margin-bottom: 24px;
        }

        /* Global Alert Messages */
        .msg-error, .msg-success {
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.4;
            font-weight: 500;
            border: 1px solid transparent;
        }
        .msg-error {
            background: #fef2f2;
            color: #991b1b;
            border-color: #fecaca;
        }
        .msg-success {
            background: #f0fdf4;
            color: #166534;
            border-color: #bbf7d0;
        }

        /* Form Fields */
        .row {
            margin-bottom: 18px;
        }

        /* Ẩn hoàn toàn hàng chứa input hidden để không bị trống giao diện */
        .row:has(input[type="hidden"]) {
            display: none;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #475569;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            height: 46px;
            padding: 0 16px;
            font-size: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background-color: #f8fafc;
            color: #334155;
            outline: none;
            transition: all 0.2s ease-in-out;
        }
        input:focus {
            background-color: #ffffff;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        /* Field Validation Errors */
        .error {
            color: #dc2626;
            font-size: 13px;
            margin-top: 6px;
            font-weight: 500;
        }

        /* Submit Button */
        button {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
        }
        button:hover {
            background: #1d4ed8;
        }
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Reset Password</h2>
    <div th:if="${error}"
         class="msg-error"
         th:text="${error}">
    </div>
    <div th:if="${msg}"
         class="msg-success"
         th:text="${msg}">
    </div>
    <form th:action="@{/reset-password}"
          th:object="${resetPasswordDTO}"
          method="post">
        <div class="row">
            <label>Email</label>
            <input type="hidden" th:field="*{email}">
        </div>
        <div class="row">
            <label>OTP</label>
            <input type="text"
                   th:field="*{otp}">
            <div class="error"
                 th:errors="*{otp}">
            </div>
        </div>
        <div class="row">
            <label>New Password</label>
            <input type="password"
                   th:field="*{newPassword}">
            <div class="error"
                 th:errors="*{newPassword}">
            </div>
        </div>
        <div class="row">
            <label>Confirm Password</label>
            <input type="password"
                   th:field="*{confirmPassword}">
            <div class="error"
                 th:errors="*{confirmPassword}">
            </div>
        </div>
        <button type="submit">
            Reset Password
        </button>
    </form>
</div>
</body>
</html>

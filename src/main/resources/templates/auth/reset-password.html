<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <style>
        body{
            font-family:Arial;
            background:#f5f6fa;
            padding:40px;
        }
        .box{
            max-width:420px;
            margin:auto;
            background:white;
            padding:24px;
            border-radius:10px;
        }
        .row{
            margin-bottom:14px;
        }
        label{
            display:block;
            font-weight:bold;
            margin-bottom:6px;
        }
        input{
            width:100%;
            padding:10px;
            box-sizing:border-box;
        }
        .error{
            color:red;
            font-size:13px;
        }
        .msg-error{
            color:red;
        }
        .msg-success{
            color:green;
        }
        button{
            width:100%;
            padding:10px;
            background:#2563eb;
            color:white;
            border:none;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Reset Password</h2>
    <div th:if="${error}"
         class="msg-error"
         th:text="${error}">
    </div>
    <div th:if="${msg}"
         class="msg-success"
         th:text="${msg}">
    </div>
    <form th:action="@{/reset-password}"
          th:object="${resetPasswordDTO}"
          method="post">
        <div class="row">
            <label>Email</label>
            <input type="email"
                   th:field="*{email}">
            <div class="error"
                 th:errors="*{email}">
            </div>
        </div>
        <div class="row">
            <label>OTP</label>
            <input type="text"
                   th:field="*{otp}">
            <div class="error"
                 th:errors="*{otp}">
            </div>
        </div>
        <div class="row">
            <label>New Password</label>
            <input type="password"
                   th:field="*{newPassword}">
            <div class="error"
                 th:errors="*{newPassword}">
            </div>
        </div>
        <div class="row">
            <label>Confirm Password</label>
            <input type="password"
                   th:field="*{confirmPassword}">
            <div class="error"
                 th:errors="*{confirmPassword}">
            </div>
        </div>
        <button type="submit">
            Reset Password
        </button>
    </form>
</div>
</body>
</html>

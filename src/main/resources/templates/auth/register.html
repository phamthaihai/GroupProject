<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #e0e7ff 0%, #f1f5f9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* Register Card */
        .register-card {
            width: 100%;
            max-width: 460px; /* Thu gọn một chút để form cân đối, ôm tay hơn */
            background: #ffffff;
            padding: 40px 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05),
            0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        h2 {
            text-align: center;
            font-size: 24px;
            color: #1e293b;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .sub {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Alert Banners (Global Messages) */
        .alert {
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.4;
            font-weight: 500;
        }
        .alert-error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        /* Form Fields */
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #475569;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            height: 46px;
            padding: 0 16px;
            font-size: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background-color: #f8fafc;
            color: #334155;
            outline: none;
            transition: all 0.2s ease-in-out;
        }
        input::placeholder {
            color: #94a3b8;
        }
        input:focus {
            background-color: #ffffff;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        /* Field Validation Errors */
        .error {
            color: #dc2626;
            font-size: 13px;
            margin-top: 6px;
            font-weight: 500;
        }

        /* Cản lỗi đè nhau nếu có nhiều thẻ .error đứng cạnh nhau (như trường hợp confirm password) */
        .error + .error {
            margin-top: 4px;
        }

        /* Submit Button */
        button {
            width: 100%;
            height: 46px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
        }
        button:hover {
            background: #1d4ed8;
        }
        button:active {
            transform: scale(0.98);
        }

        /* Footer Links */
        .bottom {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: #64748b;
        }
        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
            margin-left: 4px;
        }
        a:hover {
            color: #1d4ed8;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="register-card">
    <h2>Create Account</h2>
    <div class="sub">
        Register new candidate account
    </div>
    <div th:if="${err}"
         class="alert alert-error"
         th:text="${err}">
    </div>
    <div th:if="${msg}"
         class="alert alert-success"
         th:text="${msg}">
    </div>
    <form th:action="@{/register}"
          th:object="${registerDTO}"
          method="post">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text"
                   th:field="*{fullname}"
                   placeholder="Enter your full name">
            <div class="error"
                 th:errors="*{fullname}">
            </div>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email"
                   th:field="*{email}"
                   placeholder="Enter your email">
            <div class="error"
                 th:errors="*{email}">
            </div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password"
                   th:field="*{password}"
                   placeholder="Enter password">
            <div class="error"
                 th:errors="*{password}">
            </div>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password"
                   th:field="*{confirmPassword}"
                   placeholder="Confirm password">
            <div class="error"
                 th:errors="*{confirmPassword}">
            </div>
            <div class="error"
                 th:errors="*{passwordMatch}">
            </div>
        </div>
        <button type="submit">
            Create Account
        </button>
        <div class="bottom">
            Already have account?
            <a th:href="@{/login}">
                Login
            </a>
        </div>
    </form>
</div>
</body>
</html>

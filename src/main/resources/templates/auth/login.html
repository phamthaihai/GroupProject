<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body{
            font-family:Arial;
            background:#f5f6fa;
            padding:40px;
        }
        .box{
            max-width:450px;
            margin:auto;
            background:white;
            padding:24px;
            border-radius:10px;
        }
        .row{
            margin-bottom:14px;
        }
        label{
            display:block;
            font-weight:bold;
        }
        input{
            width:100%;
            padding:10px;
            box-sizing:border-box;
        }
        button{
            width:100%;
            padding:10px;
            background:#2563eb;
            color:white;
            border:none;
        }
        .error{
            color:red;
        }
        .success{
            color:green;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Login</h2>
    <div th:if="${error}"
         class="error"
         th:text="${error}">
    </div>
    <div th:if="${success}"
         class="success"
         th:text="${success}">
    </div>
    <form th:action="@{/login}"
          th:object="${loginDTO}"
          method="post">
        <div class="row">
            <label>Email</label>
            <input type="email"
                   th:field="*{email}">
            <div class="error"
                 th:errors="*{email}">
            </div>
        </div>
        <div class="row">
            <label>Password</label>
            <input type="password"
                   th:field="*{password}">
            <div class="error"
                 th:errors="*{password}">
            </div>
        </div>
        <button type="submit">
            Login
        </button>
    </form>
    <div style="text-align:center;margin-top:15px">
        <a th:href="@{/forgot-password}">
            Forgot password?
        </a>
        |
        <a th:href="@{/register}">
            Register
        </a>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - TalentHub</title>
    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #e0e7ff 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Login Card */
        .box {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 40px 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05),
            0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 24px;
            color: #1e293b;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }

        /* Form Fields */
        .row {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #475569;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background-color: #f8fafc;
            color: #334155;
            outline: none;
            transition: all 0.2s ease-in-out;
        }
        input:focus {
            background-color: #ffffff;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-top: 8px;
        }
        button:hover {
            background: #1d4ed8;
        }
        button:active {
            transform: scale(0.98);
        }

        /* Alert Banners */
        .alert-banner {
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.4;
            font-weight: 500;
        }
        .error-banner {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .success-banner {
            background-color: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        /* Field Errors (Validation) */
        .error {
            color: #dc2626;
            font-size: 13px;
            margin-top: 6px;
            font-weight: 500;
        }

        /* Footer Links */
        .form-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #64748b;
        }
        .form-footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .form-footer a:hover {
            color: #1d4ed8;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>User Login to TalentHub</h2>

    <div th:if="${param.error != null && param.error[0] == 'generic'}"
         class="alert-banner error-banner">
        Incorrect username or password.
    </div>

    <div th:if="${param.error != null && param.error[0] == 'locked'}"
         class="alert-banner error-banner">
        Your account has been temporarily locked after too many failed attempts. Try again in 10 minutes or contact your administrator.
    </div>

    <div th:if="${error}" class="alert-banner error-banner" th:text="${error}"></div>

    <div th:if="${success}" class="alert-banner success-banner" th:text="${success}"></div>

    <form th:action="@{/login}" th:object="${loginDTO}" method="post">
        <div class="row">
            <label>Email</label>
            <input type="email" th:field="*{email}" required>
            <div class="error" th:errors="*{email}"></div>
        </div>

        <div class="row">
            <label>Password</label>
            <input type="password" th:field="*{password}" required>
            <div class="error" th:errors="*{password}"></div>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="form-footer">
        <a th:href="@{/forgot-password}">Forgot password?</a>
        <span style="color: #cbd5e1; margin: 0 8px;">|</span>
        <a th:href="@{/register}">Create an account</a>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top right, #e0e7ff 0%, #f1f5f9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* Box Card */
        .box {
            width: 100%;
            max-width: 460px; /* Thu gọn từ 600px xuống để form cân đối và ôm tay hơn */
            background: #ffffff;
            padding: 40px 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05),
            0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 24px;
            color: #1e293b;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
        }

        /* Global Status Message */
        .success {
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.4;
            font-weight: 500;
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        /* Form Fields */
        .row {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #475569;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            height: 46px;
            padding: 0 16px;
            font-size: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background-color: #f8fafc;
            color: #334155;
            outline: none;
            transition: all 0.2s ease-in-out;
        }
        input:focus {
            background-color: #ffffff;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        /* Input Field Errors */
        .error {
            color: #dc2626;
            font-size: 13px;
            margin-top: 6px;
            font-weight: 500;
        }

        /* Actions Container (Buttons) */
        .form-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 24px;
        }

        /* Buttons Style */
        button, a.btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 46px;
            padding: 0 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* Change Password Button */
        button {
            flex: 2; /* Chiếm nhiều diện tích hơn để làm nổi bật hành động chính */
            background: #2563eb;
            color: white;
        }
        button:hover {
            background: #1d4ed8;
        }
        button:active {
            transform: scale(0.98);
        }

        /* Cancel Button */
        a.btn {
            flex: 1; /* Nút phụ gọn gàng hơn */
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        a.btn:hover {
            background: #e2e8f0;
            color: #1e293b;
        }
        a.btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Change Password</h2>

    <div th:if="${msg}" class="success" th:text="${msg}"></div>

    <form th:action="@{/change-password}" th:object="${changePasswordDTO}" method="post">

        <div class="row">
            <label>Current Password</label>
            <input type="password" th:field="*{oldPassword}">
            <div class="error" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}"></div>
        </div>

        <div class="row">
            <label>New Password</label>
            <input type="password" th:field="*{newPassword}">
            <div class="error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
        </div>

        <div class="row">
            <label>Confirm Password</label>
            <input type="password" th:field="*{confirmPassword}">
            <div class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>

        <div class="form-actions">
            <button type="submit">Change Password</button>
            <a class="btn" th:href="@{/profile}">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>

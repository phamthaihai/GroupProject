<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${mode == 'create' ? 'Create Job Posting - TalentHub' : 'Edit Job Posting - TalentHub'})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main>
    <div class="container">
        <div class="page-actions" style="margin-bottom: 2rem;">
            <div>
                <h1 th:text="${mode == 'create' ? 'Create Job Posting' : 'Edit Job Posting'}">Job Form</h1>
                <p class="subtitle">SCR-11 &mdash; <span th:text="${mode == 'create' ? 'Create a new draft' : 'Update posting'}"></span></p>
            </div>
            <a th:href="${mode == 'create' ? '/jobs' : '/jobs/' + jobDto.id}" class="btn btn-secondary">Cancel</a>
        </div>

        <div th:if="${jobStatus == 'CLOSED'}" class="alert alert-info" style="margin-bottom: 2rem;">
            Closed job postings cannot be edited.
        </div>

        <form th:action="${mode == 'create' ? '/jobs/new' : '/jobs/' + jobDto.id + '/edit'}" method="post" th:object="${jobDto}" class="card form-container">
            
            <input type="hidden" th:field="*{id}" />

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="title" style="display: block; font-weight: 500; margin-bottom: 0.5rem;">Job Title <span style="color: red;">*</span></label>
                <input type="text" id="title" th:field="*{title}" th:disabled="${jobStatus == 'CLOSED'}"
                       style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px;" required maxlength="200"/>
                <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color: red; margin-top: 0.25rem;"></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                <div class="form-group">
                    <label for="department" style="display: block; font-weight: 500; margin-bottom: 0.5rem;">Department <span style="color: red;">*</span></label>
                    <input type="text" id="department" th:field="*{department}" th:disabled="${jobStatus == 'CLOSED'}"
                           style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px;" required maxlength="100"/>
                    <div th:if="${#fields.hasErrors('department')}" th:errors="*{department}" style="color: red; margin-top: 0.25rem;"></div>
                </div>

                <div class="form-group">
                    <label for="location" style="display: block; font-weight: 500; margin-bottom: 0.5rem;">Location <span style="color: red;">*</span></label>
                    <input type="text" id="location" th:field="*{location}" th:disabled="${jobStatus == 'CLOSED'}"
                           style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px;" required maxlength="100"/>
                    <div th:if="${#fields.hasErrors('location')}" th:errors="*{location}" style="color: red; margin-top: 0.25rem;"></div>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="description" style="display: block; font-weight: 500; margin-bottom: 0.5rem;">Job Description <span style="color: red;">*</span></label>
                <textarea id="description" th:field="*{description}" th:disabled="${jobStatus == 'CLOSED'}"
                          style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px; min-height: 150px;" required></textarea>
                <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" style="color: red; margin-top: 0.25rem;"></div>
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="requirements" style="display: block; font-weight: 500; margin-bottom: 0.5rem;">Requirements</label>
                <textarea id="requirements" th:field="*{requirements}" th:disabled="${jobStatus == 'CLOSED'}"
                          style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px; min-height: 100px;"></textarea>
                <div th:if="${#fields.hasErrors('requirements')}" th:errors="*{requirements}" style="color: red; margin-top: 0.25rem;"></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                <div class="form-group">
                    <label for="salaryRange" style="display: block; font-weight: 500; margin-bottom: 0.5rem;">Salary Range</label>
                    <input type="text" id="salaryRange" th:field="*{salaryRange}" th:disabled="${jobStatus == 'CLOSED'}" placeholder="e.g. 15-20M VND"
                           style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px;" maxlength="100"/>
                    <div th:if="${#fields.hasErrors('salaryRange')}" th:errors="*{salaryRange}" style="color: red; margin-top: 0.25rem;"></div>
                </div>

                <div class="form-group">
                    <label for="applicationDeadline" style="display: block; font-weight: 500; margin-bottom: 0.5rem;">Application Deadline</label>
                    <input type="date" id="applicationDeadline" th:field="*{applicationDeadline}" th:disabled="${jobStatus == 'CLOSED'}"
                           style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px;"/>
                    <div th:if="${#fields.hasErrors('applicationDeadline')}" th:errors="*{applicationDeadline}" style="color: red; margin-top: 0.25rem;"></div>
                </div>
            </div>

            <div class="form-actions" style="display: flex; gap: 1rem;" th:if="${jobStatus != 'CLOSED'}">
                <button type="submit" class="btn btn-primary" th:text="${mode == 'create' ? 'Save as Draft' : (jobStatus == 'ACTIVE' ? 'Save Changes' : 'Save as Draft')}">Save</button>
                <a th:href="${mode == 'create' ? '/jobs' : '/jobs/' + jobDto.id}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>

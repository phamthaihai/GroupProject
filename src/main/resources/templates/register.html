<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <style>
        *{
            box-sizing:border-box;
        }
        body{
            margin:0;
            min-height:100vh;
            font-family:Arial,sans-serif;
            background:#f5f6fa;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
        }
        .register-card{
            width:100%;
            max-width:520px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 15px 40px rgba(0,0,0,.1);
        }
        h2{
            text-align:center;
            margin-bottom:10px;
        }
        .sub{
            text-align:center;
            color:#64748b;
            margin-bottom:25px;
        }
        .alert{
            padding:12px;
            border-radius:8px;
            margin-bottom:15px;
        }
        .alert-error{
            background:#fee2e2;
            color:#b91c1c;
        }
        .alert-success{
            background:#dcfce7;
            color:#166534;
        }
        .form-group{
            margin-bottom:16px;
        }
        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
        }
        input{
            width:100%;
            height:45px;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
        }
        input:focus{
            outline:none;
            border-color:#2563eb;
        }
        .error{
            color:red;
            font-size:13px;
        }
        button{
            width:100%;
            height:45px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            font-weight:bold;
            cursor:pointer;
        }
        .bottom{
            margin-top:15px;
            text-align:center;
        }
        a{
            color:#2563eb;
            text-decoration:none;
        }
    </style>
</head>
<body>
<div class="register-card">
    <h2>Create Account</h2>
    <div class="sub">
        Register new candidate account
    </div>
    <div th:if="${err}"
         class="alert alert-error"
         th:text="${err}">
    </div>
    <div th:if="${msg}"
         class="alert alert-success"
         th:text="${msg}">
    </div>
    <form th:action="@{/register}"
          th:object="${registerDTO}"
          method="post">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text"
                   th:field="*{fullname}"
                   placeholder="Enter your full name">
            <div class="error"
                 th:errors="*{fullname}">
            </div>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email"
                   th:field="*{email}"
                   placeholder="Enter your email">
            <div class="error"
                 th:errors="*{email}">
            </div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password"
                   th:field="*{password}"
                   placeholder="Enter password">
            <div class="error"
                 th:errors="*{password}">
            </div>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password"
                   th:field="*{confirmPassword}"
                   placeholder="Confirm password">
            <div class="error"
                 th:errors="*{confirmPassword}">
            </div>
            <div class="error"
                 th:errors="*{passwordMatch}">
            </div>
        </div>
        <button type="submit">
            Create Account
        </button>
        <div class="bottom">
            Already have account?
            <a th:href="@{/login}">
                Login
            </a>
        </div>
    </form>
</div>
</body>
</html>

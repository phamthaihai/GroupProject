<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">TalentHub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header th:fragment="header" class="site-header">
    <div class="container header-inner">
        <a th:href="@{/}" class="logo">TalentHub</a>
        <nav class="main-nav">
            <!-- Guests Menu -->
            <th:block th:if="${!isAuthenticated}">
                <a th:href="@{/login}">Sign In</a>
                <a th:href="@{/register}">Register</a>
            </th:block>
            <!-- Authenticated Menu -->
            <th:block th:if="${isAuthenticated}">
                <!-- Candidates Menu -->
                <th:block th:if="${currentUser != null && currentUser.role.name() == 'CANDIDATE'}">
                    <a th:href="@{/candidate/applications}">My Applications</a>
                    <span style="color: #fff; margin-left: 1.25rem; font-size: 0.95rem;" th:text="${currentUser.fullName}">Username</span>
                    <a th:href="@{/logout}">Logout</a>
                </th:block>
                <!-- Staff Menu (HR/Admin) -->
                <th:block th:if="${currentUser != null && currentUser.role.name() != 'CANDIDATE'}">
                    <a th:href="@{/profile}">Profile</a>
                    <a th:href="@{/jobs}" th:if="${canAccessHr}">Job List</a>
                    <a th:href="@{/hr/report/1}" th:if="${canAccessHr}">Pipeline Report</a>
                    <a th:href="@{/hr/dashboard}" th:if="${canAccessHr}">HR Dashboard</a>
                    <a th:href="@{/admin/dashboard}" th:if="${isAdmin}">Admin Dashboard</a>
                    <a th:href="@{/admin/users}" th:if="${isAdmin}">Users</a>
                    <a th:href="@{/logout}">Logout</a>
                </th:block>
            </th:block>
        </nav>
    </div>
</header>

<footer th:fragment="footer" class="site-footer">
    <div class="container">
        <p>&copy; 2026 TalentHub</p>
    </div>
</footer>
</body>
</html>

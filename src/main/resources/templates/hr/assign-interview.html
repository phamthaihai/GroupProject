<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gán lịch phỏng vấn</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm" style="max-width: 600px; margin: auto;">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Gán lịch phỏng vấn</h4>
        </div>
        <div class="card-body">
            <!-- Thông tin tóm tắt tương tự SCR-17 -->
            <div class="mb-3">
                <p><strong>Ứng viên:</strong> <span th:text="${app.candidate.fullName}"></span></p>
                <p><strong>Công việc:</strong> <span th:text="${app.job.title}"></span></p>
            </div>
            <hr>

            <form th:action="@{/interview/assign}" th:object="${assignment}" method="post">
                <input type="hidden" th:field="*{applicationId}" />

                <div class="form-group">
                    <label>Người phỏng vấn:</label>
                    <select th:field="*{interviewerId}" class="form-control" th:disabled="${#lists.isEmpty(interviewers)}">
                        <option th:each="i : ${interviewers}" th:value="${i.id}" th:text="${i.fullName}"></option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Ngày:</label>
                        <input type="date" th:field="*{interviewDate}" class="form-control" required />
                    </div>
                    <div class="form-group col-md-6">
                        <label>Thời gian (HH:mm):</label>
                        <input type="time" th:field="*{interviewTime}" class="form-control" required />
                    </div>
                </div>

                <div class="form-group">
                    <label>Địa điểm / Link cuộc họp:</label>
                    <input type="text" th:field="*{locationOrLink}" class="form-control" placeholder="Nhập địa điểm hoặc link" />
                </div>

                <div class="text-right mt-4">
                    <a th:href="@{'/applications/' + ${app.id}}" class="btn btn-secondary">Quay lại</a>
                    <button type="submit" class="btn btn-primary" th:disabled="${#lists.isEmpty(interviewers)}">Gán lịch</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
